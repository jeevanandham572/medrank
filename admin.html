<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MedRank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased min-h-screen bg-slate-50 flex flex-col">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 shadow-sm border-b border-slate-200/50 bg-slate-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 rounded-xl bg-red-600 flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-lock text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold text-white">Admin Control</span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-slate-300 hover:text-white font-medium transition-colors text-sm">
                        <i class="fa-solid fa-arrow-left mr-1"></i> Exit Admin
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full fade-in">
        <div id="access-denied" class="hidden text-center py-20">
            <i class="fa-solid fa-shield-halved text-6xl text-red-500 mb-4"></i>
            <h1 class="text-3xl font-bold text-slate-900">Access Denied</h1>
            <p class="text-slate-500 mt-2">You do not have permission to view this page.</p>
        </div>

        <div id="admin-content" class="hidden space-y-10">
            <div class="flex justify-between items-end border-b border-slate-200 pb-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900">Dashboard Overview</h1>
                    <p class="text-slate-500 mt-1">Manage platform content and queries.</p>
                </div>
                <div class="flex gap-2">
                    <button class="tab-btn active px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold shadow-sm" data-target="queries-section">Contact Queries</button>
                    <button class="tab-btn px-4 py-2 bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 rounded-lg text-sm font-bold shadow-sm" data-target="reviews-section">Recent Reviews</button>
                </div>
            </div>

            <!-- Queries Section -->
            <section id="queries-section" class="tab-content block">
                <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-envelope text-teal-500"></i> User Queries</h2>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-600 border-b border-slate-200">
                            <tr>
                                <th class="p-4 font-semibold">Date</th>
                                <th class="p-4 font-semibold">Name</th>
                                <th class="p-4 font-semibold">Email</th>
                                <th class="p-4 font-semibold w-1/2">Message</th>
                                <th class="p-4 font-semibold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="queries-list" class="divide-y divide-slate-100">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                    <div id="no-queries" class="hidden p-8 text-center text-slate-500 font-medium">No queries found.</div>
                </div>
            </section>

            <!-- Reviews Section -->
            <section id="reviews-section" class="tab-content hidden">
                <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-star text-yellow-500"></i> Recent Reviews</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="reviews-list">
                    <!-- Populated by JS -->
                </div>
                <div id="no-reviews" class="hidden p-8 text-center text-slate-500 font-medium bg-white rounded-2xl border border-slate-200">No reviews found.</div>
            </section>
        </div>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
