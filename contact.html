<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MedRank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased min-h-screen bg-slate-50 flex flex-col">
    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 shadow-sm border-b border-slate-200/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-emerald-600 flex items-center justify-center text-white shadow-lg group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-staff-snake text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-700 to-emerald-700">MedRank</span>
                </a>
                <a href="index.html" class="text-slate-500 hover:text-teal-600 font-medium transition-colors flex items-center gap-2 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
                    <i class="fa-solid fa-arrow-left"></i> Home
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-12 w-full fade-in">
        <h1 class="text-4xl font-bold text-slate-900 mb-2">Contact Us</h1>
        <p class="text-slate-500 mb-8 text-lg">Have a question or feedback? We'd love to hear from you. This is a community project, and we value your input.</p>

        <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-200">
            <form id="contact-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Your Name</label>
                    <input type="text" id="name" required class="w-full rounded-xl border border-slate-200 p-4 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none bg-slate-50 text-slate-800">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full rounded-xl border border-slate-200 p-4 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none bg-slate-50 text-slate-800">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Message</label>
                    <textarea id="message" required rows="5" class="w-full rounded-xl border border-slate-200 p-4 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none bg-slate-50 text-slate-800 resize-none" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-700 hover:to-emerald-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-teal-500/30 flex justify-center items-center gap-2">
                    <span>Send Message</span> <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
                <p id="form-success" class="text-emerald-600 text-sm text-center font-bold hidden mt-3 bg-emerald-50 py-3 rounded-lg border border-emerald-100">Your message has been sent successfully! We will get back to you soon.</p>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-slate-500 font-medium text-sm text-center md:text-left">
                &copy; 2026 MedRank. A non-profit community project.
            </div>
            <div class="flex gap-6 text-sm font-medium">
                <a href="contact.html" class="text-slate-500 hover:text-teal-600 transition-colors">Contact Us</a>
                <a href="terms.html" class="text-slate-500 hover:text-teal-600 transition-colors">Terms & Conditions</a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Sending...</span>';

            try {
                // Save query to Firestore "queries" collection
                await addDoc(collection(db, "queries"), {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    message: document.getElementById('message').value,
                    createdAt: serverTimestamp()
                });
                
                document.getElementById('contact-form').reset();
                document.getElementById('form-success').classList.remove('hidden');
            } catch(error) {
                console.error("Error", error);
                alert("Failed to send message. Please ensure Firebase is configured.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Send Message</span> <i class="fa-solid fa-paper-plane text-sm"></i>';
            }
        });
    </script>
</body>
</html>
